<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Agent</title>
  <script src="/retell-bundle.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Floating Trigger Button ── */
    #voiceBtn {
      position: fixed; bottom: 28px; right: 28px;
      width: 58px; height: 58px; border-radius: 50%;
      background: #111; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: transform .2s, box-shadow .2s;
      z-index: 999;
    }
    #voiceBtn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,0,0,0.3); }
    #voiceBtn svg { width: 24px; height: 24px; color: #fff; }

    /* ── Widget Backdrop ── */
    #backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
      z-index: 1000; align-items: flex-end; justify-content: center;
      padding-bottom: 100px;
    }
    #backdrop.open { display: flex; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Widget Card ── */
    #widget {
      background: #fff; border-radius: 20px;
      padding: 28px 24px 24px;
      width: 300px; text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Close ── */
    #closeBtn {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #aaa; line-height: 1;
    }
    #closeBtn:hover { color: #555; }
    #widget { position: relative; }

    /* ── Logo / Icon ── */
    .widget-logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: #111; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 14px;
    }
    .widget-logo svg { width: 24px; height: 24px; color: #fff; }

    h2 { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; color: #111; margin-bottom: 6px; }
    p  { font-family: system-ui, sans-serif; font-size: 13px; color: #888; line-height: 1.5; margin-bottom: 22px; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 13px;
      border-radius: 12px; border: none;
      font-family: system-ui, sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s, transform .15s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    #startBtn { background: #111; color: #fff; }
    #endBtn   { background: #fee2e2; color: #dc2626; display: none; }

    /* ── Status / Animation ── */
    #statusArea { margin-bottom: 18px; min-height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    #statusText { font-family: system-ui, sans-serif; font-size: 12px; color: #aaa; margin-top: 8px; }

    /* Ripple rings (connecting/ringing) */
    .ripple-wrap { position: relative; width: 44px; height: 44px; display: none; }
    .ripple-wrap.active { display: block; }
    .ripple {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.08);
      animation: ripple 1.4s ease-out infinite;
    }
    .ripple:nth-child(2) { animation-delay: .45s; }
    .ripple:nth-child(3) { animation-delay: .9s; }
    @keyframes ripple { 0% { transform: scale(.6); opacity: 1; } 100% { transform: scale(2.4); opacity: 0; } }

    .ripple-wrap .center-dot {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
    }
    .center-dot svg { width: 20px; height: 20px; }

    /* Pulse dot (connected/listening) */
    .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; display: none; animation: pulseDot 1.2s ease-in-out infinite; }
    .pulse-dot.active { display: block; }
    @keyframes pulseDot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: .6; } }
  </style>
</head>
<body>

<!-- Floating Button -->
<button id="voiceBtn" onclick="openWidget()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>
</button>

<!-- Backdrop + Widget -->
<div id="backdrop">
  <div id="widget">
    <button id="closeBtn" onclick="closeWidget()">✕</button>

    <div class="widget-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>

    <h2>AI Assistant</h2>
    <p>আমাদের AI এর সাথে কথা বলুন।<br/>যেকোনো প্রশ্ন করতে পারেন।</p>

    <div id="statusArea">
      <div class="ripple-wrap" id="ripple">
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="center-dot">
          <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          </svg>
        </div>
      </div>
      <div class="pulse-dot" id="pulseDot"></div>
      <span id="statusText"></span>
    </div>

    <button class="btn" id="startBtn" onclick="startCall()">Call Start</button>
    <button class="btn" id="endBtn"   onclick="stopCall()">Call End</button>
  </div>
</div>

<script>
  const BACKEND_URL = "/create-web-call";
  let retellClient = null;
  let callActive = false;

  function openWidget()  { document.getElementById("backdrop").classList.add("open"); }
  function closeWidget() {
    if (callActive) stopCall();
    document.getElementById("backdrop").classList.remove("open");
    resetUI();
  }

  function setStatus(text, anim) {
    document.getElementById("statusText").textContent = text;
    document.getElementById("ripple").classList.toggle("active",    anim === "ripple");
    document.getElementById("pulseDot").classList.toggle("active",  anim === "pulse");
  }

  function resetUI() {
    setStatus("", null);
    document.getElementById("startBtn").style.display = "block";
    document.getElementById("endBtn").style.display   = "none";
    document.getElementById("startBtn").disabled = false;
  }

  async function startCall() {
    try {
      document.getElementById("startBtn").disabled = true;
      setStatus("Connecting...", "ripple");

      const res  = await fetch(BACKEND_URL, { method: "POST" });
      const data = await res.json();

      const SDK = window.retellClientJsSdk;
      retellClient = new SDK.RetellWebClient();

      retellClient.on("call_started", () => {
        setStatus("Listening...", "pulse");
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("endBtn").style.display   = "block";
        callActive = true;
      });

      retellClient.on("agent_start_talking", () => setStatus("Agent speaking...", "ripple"));
      retellClient.on("agent_stop_talking",  () => setStatus("Listening...", "pulse"));

      retellClient.on("call_ended", () => {
        setStatus("Call ended", null);
        callActive = false;
        setTimeout(resetUI, 1500);
      });

      retellClient.on("error", (err) => {
        console.error(err);
        setStatus("Error. Try again.", null);
        resetUI();
      });

      await retellClient.startCall({ accessToken: data.access_token });

    } catch (err) {
      console.error(err);
      setStatus("Failed. Try again.", null);
      resetUI();
    }
  }

  function stopCall() {
    if (retellClient && callActive) retellClient.stopCall();
    callActive = false;
    setStatus("Call ended", null);
    setTimeout(resetUI, 1500);
  }
</script>
</body>
</html>
