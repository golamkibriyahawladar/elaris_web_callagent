<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent</title>
  <script src="/retell-bundle.js"></script>
  <style>
    :root {
      --primary: #24a189;
      --primary-hover: #1d8c77;
      --primary-light: rgba(36, 161, 137, 0.12);
      --primary-ring: rgba(36, 161, 137, 0.35);
      --danger: #fee2e2;
      --danger-text: #dc2626;
      --bg-widget: #ffffff;
      --text-main: #111111;
      --text-sub: #666666;
      --text-muted: #aaaaaa;
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
      --radius-card: 20px;
      --radius-btn: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Floating Trigger Button ── */
    #voiceBtn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px var(--primary-ring);
      transition: transform .2s, box-shadow .2s;
      z-index: 999;
    }

    #voiceBtn:hover {
      transform: scale(1.08);
      background: var(--primary-hover);
    }

    #voiceBtn svg {
      width: 24px;
      height: 24px;
      color: #fff;
    }

    /* ── Backdrop ── */
    #backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 100px;
    }

    #backdrop.open {
      display: flex;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ── Widget Card ── */
    #widget {
      background: var(--bg-widget);
      border-radius: var(--radius-card);
      padding: 28px 24px 24px;
      width: 300px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: slideUp .25s ease;
      position: relative;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── Close ── */
    #closeBtn {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-muted);
      line-height: 1;
    }

    #closeBtn:hover {
      color: var(--text-sub);
    }

    /* ── Logo area (top of widget) ── */
    .widget-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
    }

    /* যদি img থাকে */
    .widget-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* fallback icon */
    .widget-logo svg {
      width: 32px;
      height: 32px;
      color: var(--primary);
    }

    h2 {
      font-family: system-ui, sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    p {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.5;
      margin-bottom: 22px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-btn);
      border: none;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      opacity: .88;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    #startBtn {
      background: var(--primary);
      color: #fff;
    }

    #startBtn:hover:not(:disabled) {
      background: var(--primary-hover);
      opacity: 1;
    }

    #startBtn svg {
      width: 16px;
      height: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    #endBtn {
      background: var(--danger);
      color: var(--danger-text);
      display: none;
    }

    /* ── Status / Animation ── */
    #statusArea {
      margin-bottom: 18px;
      min-height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #statusText {
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Ripple rings */
    .ripple-wrap {
      position: relative;
      width: 44px;
      height: 44px;
      display: none;
    }

    .ripple-wrap.active {
      display: block;
    }

    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--primary-light);
      animation: ripple 1.4s ease-out infinite;
    }

    .ripple:nth-child(2) {
      animation-delay: .45s;
    }

    .ripple:nth-child(3) {
      animation-delay: .9s;
    }

    @keyframes ripple {
      0% {
        transform: scale(.6);
        opacity: 1;
      }

      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    .ripple-wrap .center-dot {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-dot svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    /* Pulse dot */
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      display: none;
      animation: pulseDot 1.2s ease-in-out infinite;
    }

    .pulse-dot.active {
      display: block;
    }

    @keyframes pulseDot {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: .6;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Button -->
  <button id="voiceBtn" onclick="openWidget()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
      <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
      <line x1="12" y1="19" x2="12" y2="23" />
      <line x1="8" y1="23" x2="16" y2="23" />
    </svg>
  </button>

  <!-- Backdrop + Widget -->
  <div id="backdrop">
    <div id="widget">
      <button id="closeBtn" onclick="closeWidget()">✕</button>

      <!-- ✅ Logo: img tag এ তোমার logo URL দাও -->
      <!-- যদি image না থাকে, icon দেখাবে automatically -->
      <div class="widget-logo">
        <img src="https://elarissolutionsllc.com/brand/elaris-logo-dark.jpg" alt="Logo"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" />
        <svg style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        </svg>
      </div>

      <!-- ✅ Title ও Description এখানে বদলাও -->
      <h2 style="color: var(--primary);">THIS IS ELARIS</h2>
      <p>Ask me anything, anytime.</p>

      <div id="statusArea">
        <div class="ripple-wrap" id="ripple">
          <div class="ripple"></div>
          <div class="ripple"></div>
          <div class="ripple"></div>
          <div class="center-dot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            </svg>
          </div>
        </div>
        <div class="pulse-dot" id="pulseDot"></div>
        <span id="statusText"></span>
      </div>

      <!-- Start button with mic icon -->
      <button class="btn" id="startBtn" onclick="startCall()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
        Call Start
      </button>
      <button class="btn" id="endBtn" onclick="stopCall()">End Call</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "/create-web-call";
    let retellClient = null;
    let callActive = false;

    function openWidget() { document.getElementById("backdrop").classList.add("open"); }
    function closeWidget() {
      if (callActive) stopCall();
      document.getElementById("backdrop").classList.remove("open");
      resetUI();
    }

    function setStatus(text, anim) {
      document.getElementById("statusText").textContent = text;
      document.getElementById("ripple").classList.toggle("active", anim === "ripple");
      document.getElementById("pulseDot").classList.toggle("active", anim === "pulse");
    }

    function resetUI() {
      setStatus("", null);
      document.getElementById("startBtn").style.display = "flex";
      document.getElementById("endBtn").style.display = "none";
      document.getElementById("startBtn").disabled = false;
    }

    async function startCall() {
      try {
        document.getElementById("startBtn").disabled = true;
        setStatus("Connecting...", "ripple");

        const res = await fetch(BACKEND_URL, { method: "POST" });
        const data = await res.json();

        const SDK = window.retellClientJsSdk;
        retellClient = new SDK.RetellWebClient();

        retellClient.on("call_started", () => {
          setStatus("Listening...", "pulse");
          document.getElementById("startBtn").style.display = "none";
          document.getElementById("endBtn").style.display = "flex";
          callActive = true;
        });
        retellClient.on("agent_start_talking", () => setStatus("Agent speaking...", "ripple"));
        retellClient.on("agent_stop_talking", () => setStatus("Listening...", "pulse"));
        retellClient.on("call_ended", () => {
          setStatus("Call ended", null);
          callActive = false;
          setTimeout(resetUI, 1500);
        });
        retellClient.on("error", (err) => {
          console.error(err);
          setStatus("Error. Try again.", null);
          resetUI();
        });

        await retellClient.startCall({ accessToken: data.access_token });
      } catch (err) {
        console.error(err);
        setStatus("Failed. Try again.", null);
        resetUI();
      }
    }

    function stopCall() {
      if (retellClient && callActive) retellClient.stopCall();
      callActive = false;
      setStatus("Call ended", null);
      setTimeout(resetUI, 1500);
    }
  </script>
</body>

</html>
